<svg
  xmlns="http://www.w3.org/2000/svg"
width="112"
  height="68"
  viewBox="0 0 112 68"
  shape-rendering="crispEdges"
>

  width="80"
  height="68"
  viewBox="0 0 80 68"
  shape-rendering="crispEdges"
>
  <!-- Deep Blue Background -->
  <rect width="80" height="68" fill="#141844" />

  <!-- Gold Repeating Pattern Unit -->
  <g fill="none" stroke="#9C8350" stroke-width="8" stroke-linecap="square" stroke-linejoin="miter">
    <!-- Top & Bottom Frame Bars -->
    <line x1="0" y1="10" x2="80" y2="10" />
    <line x1="0" y1="58" x2="80" y2="58" />

    <!-- Pure Continuous Meander Path -->
    <!-- Width per tile is exactly 80px. Line thickness and gaps are precisely 8px. -->
    <path d="M 0,42 H 24 V 26 H 56 V 42 H 40 V 34" />
    <path d="M 80,42 H 64" />
  </g>
</svg>
