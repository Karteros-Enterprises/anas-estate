<svg
  xmlns="http://www.w3.org/2000/svg"
  width="40"
  height="16"
  viewBox="0 0 40 16"
  shape-rendering="crispEdges"
>
  <rect width="40" height="16" fill="#001263" />

  <g
    fill="none"
    stroke="#B98A3D"
    stroke-width="2"
    stroke-linecap="butt"
    stroke-linejoin="miter"
  >
    <!-- Top and bottom rails -->
    <path d="M0 1 H40" />
    <path d="M0 15 H40" />

    <!-- Left meander -->
    <path
      d="
        M0 4
        H17
        V12
        H4
        V6
        H13
        V10
        H8
        V8
      "
    />

    <!-- Right meander -->
    <path
      d="
        M20 4
        H37
        V12
        H24
        V6
        H33
        V10
        H28
        V8
      "
    />

    <!-- Seam connectors -->
    <path d="M19 2 V14" />
    <path d="M39 2 V14" />
  </g>
</svg>
